openapi: 3.0.1
info:
  title: APIVoid Reputation Wrapper API
  description: >
    Wrapper API for all four APIVoid threat intelligence skills — URL reputation,
    domain reputation, domain age, and IP reputation — with single and batch
    support. All skills are synchronous and return results immediately.
  version: "2.0"

servers:
  - url: https://copilot-apivoid-plugin-hufvg5b4hfg7hygj.eastus-01.azurewebsites.net
    description: Replace with your Azure App Service URL

security:
  - ApiKeyHeader: []

paths:

  # ── URL REPUTATION ──────────────────────────────────────────

  /url-reputation:
    post:
      operationId: CheckUrlReputation
      summary: Check reputation of a single URL
      description: >
        Checks the reputation of a URL against 30+ threat intelligence engines.
        Returns safety score, risk score, and detection details. Use when asked:
        "is this URL safe?", "scan this link", "check if this URL is malicious",
        "is this a phishing URL?", "URL reputation check".
      x-ms-skill-description: >
        Checks whether a URL is malicious, phishing, spam, or safe against 30+
        threat engines. Returns safety score, risk score, and detection details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  description: The full URL to check (e.g. https://example.com/path).
      responses:
        "200":
          description: URL reputation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UrlReputationResponse'
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /url-reputation-batch:
    post:
      operationId: CheckUrlReputationBatch
      summary: Check reputation of multiple URLs in one call
      description: >
        Checks reputation of up to 10 URLs in parallel against 30+ threat engines.
        Returns a result for each URL. Use when asked to check, scan, or analyse
        a list of URLs, links, or web addresses for malicious or phishing content.
      x-ms-skill-description: >
        Batch URL reputation check — scans up to 10 URLs in parallel against 30+
        threat engines and returns verdict, safety score, and risk score for each.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [urls]
              properties:
                urls:
                  type: array
                  items: { type: string }
                  maxItems: 10
                  description: List of URLs to check (max 10).
      responses:
        "200":
          description: Batch URL reputation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResult'
        "400":
          description: Bad request

  # ── DOMAIN REPUTATION ───────────────────────────────────────

  /domain-reputation:
    post:
      operationId: CheckDomainReputation
      summary: Check reputation of a single domain
      description: >
        Checks a domain against 100+ blacklists and threat feeds. Returns detection
        count, detection rate, and per-engine results. Use when asked: "is this domain
        malicious?", "check domain reputation", "is this domain blacklisted?",
        "domain threat intelligence", "is this domain on a blocklist?".
      x-ms-skill-description: >
        Checks a domain against 100+ blacklists and threat feeds. Returns detection
        ratio and per-engine results. Use for domain reputation, blacklist, or threat checks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [host]
              properties:
                host:
                  type: string
                  description: Domain name only — no http/https (e.g. example.com).
      responses:
        "200":
          description: Domain reputation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainBlacklistResponse'
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /domain-reputation-batch:
    post:
      operationId: CheckDomainReputationBatch
      summary: Check reputation of multiple domains in one call
      description: >
        Checks up to 10 domains in parallel against 100+ blacklists and threat feeds.
        Returns a result for each domain. Use when asked to check a list of domains
        for malicious activity, blacklisting, or threat intelligence.
      x-ms-skill-description: >
        Batch domain reputation check — scans up to 10 domains in parallel against
        100+ threat feeds and returns detection ratio and blacklist results for each.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hosts]
              properties:
                hosts:
                  type: array
                  items: { type: string }
                  maxItems: 10
                  description: List of domain names to check (max 10, no http/https).
      responses:
        "200":
          description: Batch domain reputation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResult'
        "400":
          description: Bad request

  # ── DOMAIN AGE ──────────────────────────────────────────────

  /domain-age:
    post:
      operationId: CheckDomainAge
      summary: Check age and registration date of a single domain
      description: >
        Looks up when a domain was registered, when it expires, and how old it is
        in days, months, and years. Newly registered domains are commonly used in
        phishing and malware campaigns. Use when asked: "how old is this domain?",
        "when was this domain registered?", "is this a newly registered domain?",
        "check domain age", "domain registration date lookup".
      x-ms-skill-description: >
        Looks up domain registration date, expiration date, and age in days, months,
        and years. Identifies newly registered domains used in phishing campaigns.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [host]
              properties:
                host:
                  type: string
                  description: Domain name only — no http/https (e.g. example.com).
      responses:
        "200":
          description: Domain age result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainAgeResponse'
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /domain-age-batch:
    post:
      operationId: CheckDomainAgeBatch
      summary: Check age of multiple domains in one call
      description: >
        Looks up age and registration date for up to 10 domains in parallel.
        Returns registration date, expiration, and age for each domain. Use when
        asked to check the age or registration date of a list of domains.
      x-ms-skill-description: >
        Batch domain age lookup — checks registration date and age for up to 10
        domains in parallel. Identifies newly registered domains in bulk.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hosts]
              properties:
                hosts:
                  type: array
                  items: { type: string }
                  maxItems: 10
                  description: List of domain names to check (max 10, no http/https).
      responses:
        "200":
          description: Batch domain age results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResult'
        "400":
          description: Bad request

  # ── IP REPUTATION ───────────────────────────────────────────

  /ip-reputation:
    post:
      operationId: CheckIPReputation
      summary: Check reputation of a single IP address
      description: >
        Checks an IP address against threat intelligence feeds for malicious activity,
        open proxies, Tor exit nodes, VPNs, hosting providers, and spam sources.
        Use when asked: "is this IP malicious?", "check IP reputation", "is this IP
        a Tor exit node?", "is this IP a proxy?", "IP threat intelligence".
      x-ms-skill-description: >
        Checks an IP address against threat feeds for malicious activity, proxies,
        Tor exit nodes, VPNs, and spam. Returns risk flags and blacklist results.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ip]
              properties:
                ip:
                  type: string
                  description: IPv4 or IPv6 address to check.
      responses:
        "200":
          description: IP reputation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IPReputationResponse'
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /ip-reputation-batch:
    post:
      operationId: CheckIPReputationBatch
      summary: Check reputation of multiple IP addresses in one call
      description: >
        Checks up to 10 IP addresses in parallel against threat intelligence feeds.
        Returns proxy, Tor, VPN, hosting flags and blacklist results for each IP.
        Use when asked to check a list of IP addresses for malicious activity or
        threat intelligence.
      x-ms-skill-description: >
        Batch IP reputation check — scans up to 10 IPs in parallel against threat
        feeds and returns proxy, Tor, VPN, hosting flags and blacklist results for each.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ips]
              properties:
                ips:
                  type: array
                  items: { type: string }
                  maxItems: 10
                  description: List of IPv4 or IPv6 addresses to check (max 10).
      responses:
        "200":
          description: Batch IP reputation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResult'
        "400":
          description: Bad request

  # ── HEALTH ──────────────────────────────────────────────────

  /health:
    get:
      operationId: HealthCheck
      summary: Health check
      description: Returns API health status.
      responses:
        "200":
          description: API is healthy

# ── COMPONENTS ─────────────────────────────────────────────────

components:
  securitySchemes:
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:

    UrlReputationResponse:
      type: object
      properties:
        url:           { type: string }
        safety_score:  { type: integer, description: "0 (dangerous) to 100 (safe)" }
        risk_score:    { type: integer, description: "0 (safe) to 100 (high risk)" }
        detections:    { type: integer, description: Engines that flagged the URL }
        engines_count: { type: integer, description: Total engines checked }

    DomainBlacklistResponse:
      type: object
      properties:
        host:           { type: string }
        detections:     { type: integer }
        engines_count:  { type: integer }
        detection_rate: { type: string }

    DomainAgeResponse:
      type: object
      properties:
        host:                 { type: string }
        domain_age_found:     { type: boolean }
        domain_creation_date: { type: string, format: date }
        domain_expiry_date:   { type: string, format: date }
        domain_age_in_days:   { type: integer }
        domain_age_in_months: { type: integer }
        domain_age_in_years:  { type: integer }

    IPReputationResponse:
      type: object
      properties:
        ip:            { type: string }
        is_proxy:      { type: boolean }
        is_tor:        { type: boolean }
        is_vpn:        { type: boolean }
        is_hosting:    { type: boolean }
        detections:    { type: integer }
        engines_count: { type: integer }

    SingleResult:
      type: object
      properties:
        status: { type: string, enum: [success, failed] }
        data:   { type: object }
        error:  { type: string, nullable: true }

    BatchResult:
      type: object
      properties:
        total:   { type: integer }
        success: { type: integer }
        failed:  { type: integer }
        results:
          type: array
          items:
            $ref: '#/components/schemas/SingleResult'
