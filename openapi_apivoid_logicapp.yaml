openapi: 3.0.1
info:
  title: APIVoid Reputation
  description: Check URL, domain, domain age, and IP reputation using APIVoid with batch support
  version: "1.0"

paths:
  /url-reputation:
    post:
      operationId: CheckUrlReputation
      summary: Check URL reputation
      description: Check if a URL is malicious, phishing, or safe
      servers:
        - url: https://prod-70.eastus.logic.azure.com:443/workflows/6fd8bde839c746b68631d7f13f2e0a08/triggers/manual/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=MmMzKlNpoZ1jfzHdD39sjugtFkaSrkBsDiOzDwpHBvw
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
      responses:
        "200":
          description: URL reputation result
          content:
            application/json:
              schema:
                type: object

  /url-reputation-batch:
    post:
      operationId: CheckUrlReputationBatch
      summary: Check reputation of multiple URLs
      description: Batch check multiple URLs for malicious activity
      servers:
        - url: https://prod-70.eastus.logic.azure.com:443/workflows/6fd8bde839c746b68631d7f13f2e0a08/triggers/manual/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=MmMzKlNpoZ1jfzHdD39sjugtFkaSrkBsDiOzDwpHBvw
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [urls]
              properties:
                urls:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Batch URL reputation results
          content:
            application/json:
              schema:
                type: object

  /domain-reputation:
    post:
      operationId: CheckDomainReputation
      summary: Check domain reputation
      description: Check if a domain is blacklisted or malicious
      servers:
        - url: https://prod-70.eastus.logic.azure.com:443/workflows/6fd8bde839c746b68631d7f13f2e0a08/triggers/manual/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=MmMzKlNpoZ1jfzHdD39sjugtFkaSrkBsDiOzDwpHBvw
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [host]
              properties:
                host:
                  type: string
      responses:
        "200":
          description: Domain reputation result
          content:
            application/json:
              schema:
                type: object

  /domain-reputation-batch:
    post:
      operationId: CheckDomainReputationBatch
      summary: Check reputation of multiple domains
      description: Batch check multiple domains
      servers:
        - url: https://prod-70.eastus.logic.azure.com:443/workflows/6fd8bde839c746b68631d7f13f2e0a08/triggers/manual/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=MmMzKlNpoZ1jfzHdD39sjugtFkaSrkBsDiOzDwpHBvw
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hosts]
              properties:
                hosts:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Batch domain reputation results
          content:
            application/json:
              schema:
                type: object

  /domain-age:
    post:
      operationId: CheckDomainAge
      summary: Check domain age
      description: Check when a domain was registered
      servers:
        - url: https://prod-70.eastus.logic.azure.com:443/workflows/6fd8bde839c746b68631d7f13f2e0a08/triggers/manual/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=MmMzKlNpoZ1jfzHdD39sjugtFkaSrkBsDiOzDwpHBvw
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [host]
              properties:
                host:
                  type: string
      responses:
        "200":
          description: Domain age result
          content:
            application/json:
              schema:
                type: object

  /domain-age-batch:
    post:
      operationId: CheckDomainAgeBatch
      summary: Check age of multiple domains
      description: Batch check domain age
      servers:
        - url: https://prod-70.eastus.logic.azure.com:443/workflows/6fd8bde839c746b68631d7f13f2e0a08/triggers/manual/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=MmMzKlNpoZ1jfzHdD39sjugtFkaSrkBsDiOzDwpHBvw
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hosts]
              properties:
                hosts:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Batch domain age results
          content:
            application/json:
              schema:
                type: object

  /ip-reputation:
    post:
      operationId: CheckIPReputation
      summary: Check IP reputation
      description: Check if an IP is malicious or a proxy/Tor/VPN
      servers:
        - url: https://prod-70.eastus.logic.azure.com:443/workflows/6fd8bde839c746b68631d7f13f2e0a08/triggers/manual/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=MmMzKlNpoZ1jfzHdD39sjugtFkaSrkBsDiOzDwpHBvw
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ip]
              properties:
                ip:
                  type: string
      responses:
        "200":
          description: IP reputation result
          content:
            application/json:
              schema:
                type: object

  /ip-reputation-batch:
    post:
      operationId: CheckIPReputationBatch
      summary: Check reputation of multiple IPs
      description: Batch check multiple IP addresses
      servers:
        - url: https://prod-70.eastus.logic.azure.com:443/workflows/6fd8bde839c746b68631d7f13f2e0a08/triggers/manual/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=MmMzKlNpoZ1jfzHdD39sjugtFkaSrkBsDiOzDwpHBvw
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ips]
              properties:
                ips:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Batch IP reputation results
          content:
            application/json:
              schema:
                type: object
